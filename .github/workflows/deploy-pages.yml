name: Deploy GitHub Pages

# Publishes the OpenClaw .NET public site:
#   /                       -> docs/landing/index.html (hub page)
#   /test-dashboard/        -> docs/test-dashboard/   (live test results)
#   /sessions/session-N/    -> sessions/session-N/    (slides + assets)
#
# To add a new session: drop slides.html in sessions/session-N/ and update
# docs/landing/index.html — the workflow picks them up automatically.

on:
  push:
    branches: [main]
    paths:
      - 'docs/landing/**'
      - 'docs/test-dashboard/**'
      - 'sessions/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble _site
        run: |
          set -e
          mkdir -p _site
          # Landing page goes to root
          cp -R docs/landing/. _site/
          # Test dashboard
          mkdir -p _site/test-dashboard
          cp -R docs/test-dashboard/. _site/test-dashboard/
          # Sessions (slides + any session assets)
          mkdir -p _site/sessions
          cp -R sessions/. _site/sessions/
          echo "::group::Site contents"
          find _site -maxdepth 3 -type f | sort
          echo "::endgroup::"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
